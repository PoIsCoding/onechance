<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Chance – Statistiken</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
      :root {
        --bg: #0d0f1a;
        --surface: #151826;
        --surface2: #1c2035;
        --border: rgba(255, 255, 255, 0.07);
        --text: #f0f0f8;
        --muted: #8888aa;
        --accent: #f5e642;
        --accent2: #ff6b6b;
        --accent3: #64ffda;
        --accent4: #b794f4;
        --accent5: #fbb03b;
        --font-display: "Syne", sans-serif;
        --font-body: "DM Sans", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        min-height: 100vh;
        padding: 40px 24px 80px;
      }

      /* ── Header ── */
      .header {
        max-width: 1100px;
        margin: 0 auto 48px;
        display: flex;
        align-items: baseline;
        gap: 16px;
        flex-wrap: wrap;
      }

      .logo {
        font-family: var(--font-display);
        font-size: 32px;
        font-weight: 800;
        color: var(--text);
      }

      .logo em {
        color: var(--accent);
        font-style: normal;
      }

      .header-sub {
        font-size: 14px;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .live-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent3);
        margin-right: 6px;
        animation: pulse 1.8s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.7);
        }
      }

      /* ── Grid ── */
      .grid {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
        margin-bottom: 32px;
      }

      /* ── Stat-Karte ── */
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px 20px;
        position: relative;
        overflow: hidden;
        transition: border-color 0.2s;
      }

      .stat-card:hover {
        border-color: rgba(255, 255, 255, 0.14);
      }

      .stat-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 80% 20%,
          var(--card-glow, rgba(245, 230, 66, 0.05)) 0%,
          transparent 65%
        );
        pointer-events: none;
      }

      .stat-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .stat-value {
        font-family: var(--font-display);
        font-size: 42px;
        font-weight: 800;
        line-height: 1;
        color: var(--card-color, var(--accent));
      }

      .stat-sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }

      /* ── Breite Karten ── */
      .wide {
        grid-column: span 2;
      }
      @media (max-width: 520px) {
        .wide {
          grid-column: span 1;
        }
      }

      /* ── Tabelle ── */
      .section {
        max-width: 1100px;
        margin: 0 auto 32px;
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th {
        text-align: left;
        padding: 10px 14px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }

      td {
        padding: 11px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
      }

      .badge-win {
        background: rgba(100, 255, 218, 0.12);
        color: var(--accent3);
      }
      .badge-lose {
        background: rgba(255, 107, 107, 0.12);
        color: var(--accent2);
      }

      /* ── Kategorie-Balken ── */
      .cat-bar-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .cat-bar {
        flex: 1;
        height: 6px;
        background: var(--surface2);
        border-radius: 3px;
        overflow: hidden;
      }

      .cat-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.6s ease;
      }

      .cat-count {
        font-size: 12px;
        color: var(--muted);
        min-width: 28px;
        text-align: right;
      }

      /* ── Loading ── */
      .loading {
        text-align: center;
        padding: 80px 20px;
        color: var(--muted);
        font-size: 14px;
      }

      /* ── Footer ── */
      .footer {
        max-width: 1100px;
        margin: 48px auto 0;
        display: flex;
        gap: 16px;
        justify-content: center;
      }

      .footer a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
        padding: 6px 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        transition:
          color 0.2s,
          border-color 0.2s;
      }

      .footer a:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1 class="logo">One <em>Chance</em></h1>
      <span class="header-sub"
        ><span class="live-dot"></span>Live-Statistiken</span
      >
    </div>

    <div id="loading" class="loading">Daten werden geladen…</div>
    <div id="dashboard" style="display: none">
      <!-- ── Gesamt-Karten ── -->
      <div class="grid" id="grid-totals"></div>

      <!-- ── Kategorien ── -->
      <div class="section">
        <div class="section-title">Gewählte Kategorien</div>
        <table id="table-categories">
          <thead>
            <tr>
              <th>Kategorie</th>
              <th>Gespielt</th>
              <th>Anteil</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- ── Letzte 14 Tage ── -->
      <div class="section">
        <div class="section-title">Letzte 14 Tage</div>
        <table id="table-daily">
          <thead>
            <tr>
              <th>Datum</th>
              <th>Logins</th>
              <th>Spiele</th>
              <th>Gewonnen</th>
              <th>Verloren</th>
              <th>Winrate</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="index.html">← Zurück zum Spiel</a>
      <a href="https://github.com/poiscoding/" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
          />
        </svg>
        GitHub
      </a>
      <a
        href="https://buymeacoffee.com/poiscoding"
        target="_blank"
        rel="noopener"
        >☕ Buy me a coffee</a
      >
    </div>

    <script>
      // ── Firebase Config (identisch mit game.js) ──
      const FIREBASE_CONFIG = {
        apiKey: "AIzaSyBwrDM4sBowMX5ozhllSZOmy0tItp0iFJM",
        authDomain: "one-chance-63038.firebaseapp.com",
        databaseURL:
          "https://one-chance-63038-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "one-chance-63038",
        storageBucket: "one-chance-63038.firebasestorage.app",
        messagingSenderId: "19576021800",
        appId: "1:19576021800:web:dce22e95049af27362e61d",
      };

      firebase.initializeApp(FIREBASE_CONFIG);
      const db = firebase.database();

      // ── Kategorie-Labels & Farben ──
      const CAT_LABELS = {
        leicht: "😊 Leicht",
        mittel: "🤔 Mittel",
        schwer: "🧠 Schwer",
        fsk18: "🔞 FSK18",
      };
      const CAT_COLORS = {
        leicht: "#64ffda",
        mittel: "#f5e642",
        schwer: "#ff6b6b",
        fsk18: "#b794f4",
      };

      // ── Dashboard rendern ──
      db.ref("stats").on("value", (snap) => {
        const data = snap.val() || {};
        document.getElementById("loading").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        renderTotals(data.totals || {});
        renderCategories(data.categories || {});
        renderDaily(data.daily || {});
      });

      function renderTotals(t) {
        const gamesStarted = t.gamesStarted || 0;
        const gamesWon = t.gamesWon || 0;
        const gamesLost = t.gamesLost || 0;
        const winrate =
          gamesStarted > 0 ? Math.round((gamesWon / gamesStarted) * 100) : 0;
        const avgPlayers =
          (t.playerCount || 0) > 0
            ? (t.playerSum / t.playerCount).toFixed(1)
            : "—";

        const cards = [
          {
            label: "Spiele gesamt",
            value: gamesStarted,
            color: "var(--accent)",
            glow: "rgba(245,230,66,0.06)",
          },
          {
            label: "Erfolgreich",
            value: gamesWon,
            color: "var(--accent3)",
            glow: "rgba(100,255,218,0.06)",
          },
          {
            label: "Nicht erfolgreich",
            value: gamesLost,
            color: "var(--accent2)",
            glow: "rgba(255,107,107,0.06)",
          },
          {
            label: "Winrate",
            value: winrate + "%",
            color: "var(--accent4)",
            glow: "rgba(183,148,244,0.06)",
            sub: "aller gestarteten Runden",
          },
          {
            label: "Unique Users",
            value: t.uniqueUsers || 0,
            color: "var(--accent5)",
            glow: "rgba(251,176,59,0.06)",
          },
          {
            label: "Logins gesamt",
            value: t.logins || 0,
            color: "var(--muted)",
            glow: "rgba(255,255,255,0.03)",
          },
          {
            label: "Ø Spieler / Lobby",
            value: avgPlayers,
            color: "var(--accent3)",
            glow: "rgba(100,255,218,0.06)",
            sub: "aktive Spieler",
          },
        ];

        document.getElementById("grid-totals").innerHTML = cards
          .map(
            (c) => `
    <div class="stat-card" style="--card-color:${c.color};--card-glow:${c.glow}">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      ${c.sub ? `<div class="stat-sub">${c.sub}</div>` : ""}
    </div>
  `,
          )
          .join("");
      }

      function renderCategories(cats) {
        const total = Object.values(cats).reduce((s, v) => s + v, 0);
        const order = ["leicht", "mittel", "schwer", "fsk18"];
        const tbody = document.querySelector("#table-categories tbody");

        tbody.innerHTML = order
          .map((key) => {
            const count = cats[key] || 0;
            const pct = total > 0 ? Math.round((count / total) * 100) : 0;
            const color = CAT_COLORS[key] || "#888";
            return `<tr>
      <td>${CAT_LABELS[key] || key}</td>
      <td>${count}</td>
      <td>
        <div class="cat-bar-wrap">
          <div class="cat-bar">
            <div class="cat-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <span class="cat-count">${pct}%</span>
        </div>
      </td>
    </tr>`;
          })
          .join("");
      }

      function renderDaily(daily) {
        // Letzte 14 Tage
        const keys = Object.keys(daily).sort().reverse().slice(0, 14);
        const tbody = document.querySelector("#table-daily tbody");

        if (keys.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:20px">Noch keine Tagesdaten</td></tr>';
          return;
        }

        tbody.innerHTML = keys
          .map((date) => {
            const d = daily[date] || {};
            const started = d.gamesStarted || 0;
            const won = d.gamesWon || 0;
            const lost = d.gamesLost || 0;
            const winrate =
              started > 0 ? Math.round((won / started) * 100) + "%" : "—";
            const [year, month, day] = date.split("-");
            const label = `${day}.${month}.${year}`;

            return `<tr>
      <td>${label}</td>
      <td>${d.logins || 0}</td>
      <td>${started}</td>
      <td><span class="badge badge-win">${won}</span></td>
      <td><span class="badge badge-lose">${lost}</span></td>
      <td>${winrate}</td>
    </tr>`;
          })
          .join("");
      }
    </script>
  </body>
</html>
